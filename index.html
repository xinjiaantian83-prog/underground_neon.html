<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Retro Void</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial,sans-serif;
  background:#090912;
  color:#fff;
}

.hero{
  position:relative;
  width:100%;
  height:360px;
  overflow:hidden;
}

.hero iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

.overlay{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:rgba(0,0,0,0.28);
  padding:20px;
}

.overlay h1{
  font-size:42px;
  letter-spacing:3px;
  margin-bottom:10px;
}

.overlay p{
  font-size:16px;
  max-width:700px;
}

.section{
  max-width:1000px;
  margin:auto;
  padding:50px 20px;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 22px;
  background:#ff4fd8;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
}
</style>
</head>

<body>

<section class="hero">
  <iframe src="underground_neon 2.html"></iframe>

  <div class="overlay">
    <h1>RETRO VOID</h1>
    <p>Pixel worlds, neon dreams, and digital art for screens and walls.</p>
    <a class="btn" href="#">SHOP NOW</a>
  </div>
</section>

<section class="section">
  <h2>Gallery</h2>
  <p>ここに作品を追加していく。</p>
</section>

</body>
</html>
